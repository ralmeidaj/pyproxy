# Ambiente de desenvolvimento completo — Payproxy
#
# Uso:
#   docker compose up -d
#   docker compose down
#
# Portas:
#   App (nginx)  → http://localhost:8000
#   PostgreSQL   → localhost:5432
#   Redis        → localhost:6379
#   MinIO API    → localhost:9000
#   MinIO UI     → http://localhost:9001  (minioadmin / minioadmin)
#   Mailpit UI   → http://localhost:8025
#   Mailpit SMTP → localhost:1025

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: payproxy-app
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - payproxy

  nginx:
    image: nginx:alpine
    container_name: payproxy-nginx
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - payproxy

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: payproxy-worker
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - app
      - redis
    networks:
      - payproxy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: payproxy-scheduler
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    depends_on:
      - app
    networks:
      - payproxy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: payproxy-postgres
    environment:
      POSTGRES_DB: payproxy
      POSTGRES_USER: payproxy
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - payproxy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payproxy -d payproxy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: payproxy-redis
    command: redis-server --requirepass secret
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - payproxy
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "secret", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio
    container_name: payproxy-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - payproxy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-setup:
    image: minio/mc
    container_name: payproxy-minio-setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/payproxy &&
        echo 'Bucket payproxy criado'
      "
    restart: "no"
    networks:
      - payproxy

  mailpit:
    image: axllent/mailpit
    container_name: payproxy-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - payproxy

networks:
  payproxy:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
